name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - run: composer install --no-interaction
      - run: vendor/bin/phpstan analyse

  test:
    name: Test (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer
          coverage: xdebug
      - run: composer install --no-interaction
      - run: vendor/bin/phpunit --coverage-text

  notify-packagist:
    name: Notify Packagist
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Notify Packagist
        run: |
          curl -s -XPOST \
            -H "API-TOKEN: ${{ secrets.PACKAGIST_TOKEN }}" \
            "https://packagist.org/api/update-package?url=https://github.com/signdocsbrasil/signdocs-brasil-php"
